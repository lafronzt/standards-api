services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: standards
      POSTGRES_PASSWORD: standards
      POSTGRES_DB: standards_api
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U standards -d standards_api"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://standards:standards@postgres:5432/standards_api?schema=public
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
