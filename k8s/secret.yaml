# DO NOT commit with real values.
# Create this secret imperatively:
#
#   kubectl create secret generic standards-api-secret \
#     --namespace standards-api \
#     --from-literal=database-url='postgresql://user:pass@postgres-svc:5432/standards' \
#     --from-literal=api-key='your-secret-api-key'
#
# Or use Sealed Secrets / External Secrets Operator if available in your cluster.
apiVersion: v1
kind: Secret
metadata:
  name: standards-api-secret
  namespace: standards-api
type: Opaque
